schema_version: 1

context:
  version: "5.0.0"

package:
  name: coolname
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/coolname/coolname-${{ version }}.tar.gz
  sha256: 594bc6c98ebc75ddd51c0ce10efbb5d2556c14eac60b5b36900dfdd5db20eecf

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - coolname = coolname.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==80.10.1
    - setuptools-scm ==9.2.2
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - coolname
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - coolname --help

about:
  summary: Random name and slug generator
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/alexanderlukanin13/coolname
  documentation: https://coolname.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - ocefpaf
